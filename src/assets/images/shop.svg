<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 130" preserveAspectRatio="xMidYMid meet">
  <!-- Wall -->
  <rect width="300" height="130" fill="#F0EDE6"/>
  <rect x="1" y="1" width="298" height="128" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Awning base -->
  <rect x="0" y="0" width="300" height="38" fill="#1A1A1A"/>
  <!-- Awning stripes -->
  <rect x="3"   y="0" width="19" height="36" fill="white" opacity="0.22"/>
  <rect x="46"  y="0" width="19" height="36" fill="white" opacity="0.22"/>
  <rect x="89"  y="0" width="19" height="36" fill="white" opacity="0.22"/>
  <rect x="132" y="0" width="19" height="36" fill="white" opacity="0.22"/>
  <rect x="175" y="0" width="19" height="36" fill="white" opacity="0.22"/>
  <rect x="218" y="0" width="19" height="36" fill="white" opacity="0.22"/>
  <rect x="261" y="0" width="19" height="36" fill="white" opacity="0.22"/>
  <!-- Scallop fringe (triangular pennants) -->
  <polygon points="0,38 22,38 11,50"   fill="#1A1A1A"/>
  <polygon points="43,38 65,38 54,50"  fill="#1A1A1A"/>
  <polygon points="86,38 108,38 97,50" fill="#1A1A1A"/>
  <polygon points="129,38 151,38 140,50" fill="#1A1A1A"/>
  <polygon points="172,38 194,38 183,50" fill="#1A1A1A"/>
  <polygon points="215,38 237,38 226,50" fill="#1A1A1A"/>
  <polygon points="258,38 280,38 269,50" fill="#1A1A1A"/>
  <!-- GRND sign -->
  <text x="150" y="68" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="900" fill="#1A1A1A" text-anchor="middle">GRND</text>
  <text x="150" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8A8A8E" text-anchor="middle" letter-spacing="4">COFFEE</text>
  <!-- Door -->
  <rect x="116" y="93" width="68" height="37" rx="5" fill="#1C1C1E"/>
  <!-- Windows -->
  <rect x="20"  y="89" width="72" height="27" rx="3" fill="#D4EAF0" stroke="#1A1A1A" stroke-width="1.5"/>
  <rect x="208" y="89" width="72" height="27" rx="3" fill="#D4EAF0" stroke="#1A1A1A" stroke-width="1.5"/>
</svg>
